services:
  - type: web
    name: earnstrack-api
    runtime: docker
    plan: free
    rootDir: backend/eTracker.API
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: JwtSettings__Issuer
        value: Earnstrack
      - key: JwtSettings__Audience
        value: Earnstrack-users
      - key: Cors__AllowedOrigins__0
        value: https://maynardrt.github.io
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: JwtSettings__SecretKey
        sync: false
      - key: Seed__AdminEmail
        sync: false
      - key: Seed__AdminPassword
        sync: false
      - key: Seed__AdminFullName
        value: Earnstrack Administrator
