name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  backend:
    name: Backend Build And Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore backend solution
        run: dotnet restore eTracker.sln

      - name: Build backend solution
        run: dotnet build eTracker.sln --configuration Release --no-restore

      - name: Run backend tests
        run: dotnet test backend/eTracker.API.Tests/eTracker.API.Tests.csproj --configuration Release --no-build --verbosity normal

  frontend:
    name: Frontend Build And Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm run test

      - name: Build frontend
        env:
          VITE_API_URL: http://localhost:5000/api
        run: npm run build
